name: ecoreport

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecoreport-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - src/env/rabbitmq.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecoreport-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: ecoreport-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - src/env/minio.env
    volumes:
      - minio_data:/data
    networks:
      - ecoreport-net
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ecoreport-postgres
    ports:
      - "5432:5432"
    env_file:
      - src/env/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecoreport-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecoreport"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
    container_name: ecoreport-app
    ports:
      - "8080:8080"
    env_file:
      - src/env/app.env
      - src/env/rabbitmq.env
      - src/env/minio.env
      - src/env/postgres.env
      - src/env/frontend.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - ecoreport-net
    volumes:
      - ./src:/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    restart: unless-stopped

volumes:
  rabbitmq_data:
    name: ecoreport_rabbitmq_data
  minio_data:
    name: ecoreport_minio_data
  postgres_data:
    name: ecoreport_postgres_data

networks:
  ecoreport-net:
    name: ecoreport_network
    driver: bridge