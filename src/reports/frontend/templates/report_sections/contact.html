
<section class="section">
    <div class="section__row">
        <div class="field">
            <label for="org-address">Адрес организации</label>
            <input id="org-address" type="text" placeholder="Введите ваш ответ...">
        </div>
        <div class="field">
            <label for="org-email">Почта</label>
            <input id="org-email" type="text" placeholder="Введите ваш ответ...">
        </div>
        <div class="field">
            <label for="resp-pos">Должность</label>
            <input id="resp-pos" type="text" placeholder="Введите ваш ответ...">
        </div>
    </div>

    <div class="section__row">
        <div class="field">
            <label for="org-phone">Телефон</label>
            <input id="org-phone" type="text" placeholder="+7 (ххх) ххх - хх - хх">
        </div>
        <div class="field">
            <label for="resp-name">ФИО ответственного</label>
            <input id="resp-name" type="text" placeholder="Фамилия И. О.">
        </div>
        <div class="field">
            <label for="report-date">Дата составления отчета</label>
            <input id="report-date" type="date" placeholder="  DD.MM.YYYY">
        </div>
    </div>
</section>
