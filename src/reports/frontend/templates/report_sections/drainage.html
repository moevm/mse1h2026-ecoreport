<section class="section">
    <div class="section__row">
        <div class="field">
            <label for="type-system">Тип дренажной системы</label>
            <select id="type-system">
                <option value="">Выберите тип дренажной системы</option>
                <option value="горизонтальный">горизонтальный</option>
                <option value="вертикальный">вертикальный</option>
                <option value="пластовый">пластовый</option>
                <option value="кольцевой">кольцевой</option>
                <option value="поверхностный точечный">поверхностный точечный</option>
                <option value="поверхностный линейный">поверхностный линейный</option>
                <option value="глубинный">глубинный</option>
                <option value="закрытый">закрытый</option>
                <option value="открытый">открытый</option>
                <option value="засыпной">засыпной</option>
                <option value="головной">головной</option>
                <option value="береговой">береговой</option>
                <option value="систематический">систематический</option>
                <option value="комбинированный">комбинированный</option>
            </select>
        </div>
        <div class="field">
            <label for="pipe-diameter">Диаметр труб (мм)</label>
            <input id="pipe-diameter" type="text" placeholder="Введите ваш ответ...">
        </div>
        <div class="field">
            <label for="total-length">Общая протяженность (м)</label>
            <input id="total-length" type="text" placeholder="Введите ваш ответ...">
        </div>
    </div>

    <div class="section__row">
        <div class="field">
            <label for="pipe-material">Материал труб</label>
            <input id="pipe-material" type="text" placeholder="Введите ваш ответ...">
        </div>
        <div class="field">
            <label for="burial-depth">Глубина заложения (м)</label>
            <input id="burial-depth" type="text" placeholder="Введите ваш ответ...">
        </div>
        <div class="field">
            <label for="laying-year">Год заложения</label>
            <input id="laying-year" type="text" placeholder="YYYY">
        </div>
    </div>
    <div class="section__row">
        <div class="field">
            <label for="wells-count">Количество колодцев (шт)</label>
            <input id="wells-count" type="text" placeholder="Введите ваш ответ...">
        </div>
    </div>
</section>
