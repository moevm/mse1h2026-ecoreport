<section class="section">
    <h2>Импорт данных</h2>
    <div class="section__row">
        <label for="file-upload" class="file_upload">
            Прикрепите файл формата .xlsx / .csv ...
            <img src="{{ request.url_for('static', path='images/clip.png') }}" />
        </label>
        <input id="file-upload" type="file" accept=".csv,.xlsx,.xls" />
        <button type="button" class="action__button action__button--small" onclick="importFromFile()">Принять</button>
    </div>
    <span id="import-status"></span>
    <script src="{{ request.url_for('static', path='js/create_report/import-file.js') }}"></script>
</section>
