
<section class="section">
    <div class="section__row">
        <div class="field">
            <label for="organization-name">Название организации</label>
            <input id="organization-name" type="text" placeholder="Введите ваш ответ...">
        </div>
        <div class="field">
            <label for="full-object-name">Полное название объекта</label>
            <input id="full-object-name" type="text" placeholder="Введите ваш ответ...">
        </div>
        <div class="field">
            <label for="short-object-name">Сокращенное название объекта</label>
            <input id="short-object-name" type="text" placeholder="Введите ваш ответ...">
        </div>
    </div>

    <div class="section__row">
        <div class="field">
            <label for="region">Регион размещения</label>
            <input id="region" type="text" placeholder="Введите ваш ответ...">
        </div>
        <div class="field">
            <label for="report-year">Год наблюдений</label>
            <input id="report-year" type="number" min="1900" max="2026" placeholder="YYYY">
        </div>
    </div>
</section>
